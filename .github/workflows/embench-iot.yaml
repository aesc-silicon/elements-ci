name: Embench

on:
  push:
    paths:
      - '.github/workflows/embench-iot.yaml'
  schedule:
  - cron: "0 0 * * *"

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      repository_name: elements-embench-iot
      remote_name: https://github.com/embench/embench-iot.git
      remote_branch: master
    steps:
    - name: Clone Repository
      run: |
        rm -rf ${{ env.repository_name }}
        git clone https://dnltz:${{ secrets.PAT }}@github.com/phytec-labs/${{ env.repository_name }}.git ${{ env.repository_name }}
        cd ${{ env.repository_name }}
        git config --global user.email "no-mail@phytec.de"
        git config --global user.name "Elements CI"
        git remote add upstream ${{ env.remote_name }}
        git fetch upstream
        cd ../

    - name: Pull Upstream
      run: |
        cd ${{ env.repository_name }}
        git checkout upstream
        git pull upstream ${{ env.remote_branch }}
        git push origin HEAD:upstream -f
        cd ../

    - name: Rebase to "rebased"
      run: |
        cd ${{ env.repository_name }}
        git checkout rebased
        git rebase upstream/${{ env.remote_branch }}
        git push origin HEAD:rebased -f
        cd ../

    - name: Merge to "main"
      run: |
        cd ${{ env.repository_name }}
        git checkout main
        git merge upstream/${{ env.remote_branch }}
        git push origin HEAD:main -f
        cd ../
